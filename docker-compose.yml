services:

  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "5000:5000"
    environment:
      - ORDER_SERVICE_URL=http://order-service:5001
      - INVENTORY_SERVICE_URL=http://inventory-service:5002
      - NOTIFICATION_SERVICE_URL=http://notification-service:5003
    depends_on:
      - order-service
      - inventory-service
      - notification-service

  order-service:
    build: ./services/order-service
    container_name: order-service
    ports:
      - "5001:5001"
    environment:
      - DB_PATH=/data/orders.db
      - AWS_REGION=ap-south-1
      # SNS_TOPIC_ARN set later once Terraform creates it
    volumes:
      - order_data:/data

  inventory-service:
    build: ./services/inventory-service
    container_name: inventory-service
    ports:
      - "5002:5002"
    environment:
      - DB_PATH=/data/inventory.db
      - AWS_REGION=ap-south-1
      # SQS_QUEUE_URL set later once Terraform creates it
    volumes:
      - inventory_data:/data

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    ports:
      - "5003:5003"
    environment:
      - AWS_REGION=ap-south-1
      - SENDER_EMAIL=noreply@example.com
      # SQS_QUEUE_URL set later once Terraform creates it

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - order-service
      - inventory-service
      - notification-service

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

volumes:
  order_data:
  inventory_data: